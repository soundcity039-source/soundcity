<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoundCity - ライブ管理</title>
    <meta name="description" content="軽音サークル ライブ企画管理アプリ" />
    <!-- GitHub Pages SPAリダイレクト処理 -->
    <script>
      (function() {
        var r = new URLSearchParams(window.location.search).get('r')
        if (r) {
          window.history.replaceState(null, '', '/soundcity' + r)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
